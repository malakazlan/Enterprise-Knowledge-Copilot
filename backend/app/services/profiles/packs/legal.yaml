# Legal — contracts, case law, compliance. Precision and citations above all.
name: legal
display_name: Legal & Law Firms
description: >-
  Tuned for contracts, case law, statutes, and compliance policies. Clause-level
  chunks, exact-term matching weighted up, zero-temperature answers, and strict
  citation and refusal thresholds.
industry: legal

chunking:
  strategy: semantic
  chunk_size: 800         # clause/paragraph granularity — legal meaning is local
  chunk_overlap: 120
  respect_page_boundaries: true

retrieval:
  dense_top_k: 40         # wider recall net; the reranker restores precision
  sparse_top_k: 40        # exact terms of art ("force majeure", section numbers) matter
  fusion: rrf
  rrf_k: 60
  rerank_enabled: true
  final_top_n: 10         # legal answers often need multiple supporting clauses

generation:
  temperature: 0.0        # no creativity in legal answers
  max_tokens: 2500
  citations_required: true
  groundedness_check: true
  confidence_threshold_review: 0.65   # humans review anything not clearly grounded
  confidence_threshold_refuse: 0.40   # refuse rather than risk a wrong legal answer
