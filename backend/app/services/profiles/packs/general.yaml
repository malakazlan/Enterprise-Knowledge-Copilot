# Default profile — balanced for mixed corporate document collections.
name: general
display_name: General Knowledge Base
description: >-
  Balanced defaults for mixed document collections: policies, wikis, reports,
  and internal documentation. A sensible starting point for any organization.
industry: null

chunking:
  strategy: semantic
  chunk_size: 1200        # roomy chunks keep narrative context together
  chunk_overlap: 150
  respect_page_boundaries: true

retrieval:
  dense_top_k: 30
  sparse_top_k: 30
  fusion: rrf
  rrf_k: 60
  rerank_enabled: true
  final_top_n: 8

generation:
  temperature: 0.1
  max_tokens: 2000
  citations_required: true
  groundedness_check: true
  confidence_threshold_review: 0.5
  confidence_threshold_refuse: 0.25
