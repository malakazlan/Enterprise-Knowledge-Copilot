name: enterprise-knowledge-copilot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ekc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ekc}
      POSTGRES_DB: ${POSTGRES_DB:-ekc}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ekc} -d ${POSTGRES_DB:-ekc}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - path: ../backend/.env
        required: false
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-local}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ekc}:${POSTGRES_PASSWORD:-ekc}@postgres:5432/${POSTGRES_DB:-ekc}
      REDIS_URL: redis://redis:6379/0
      VECTOR_STORE_PROVIDER: ${VECTOR_STORE_PROVIDER:-qdrant}
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  qdrantdata:
